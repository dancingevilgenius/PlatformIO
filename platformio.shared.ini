; Shared PlatformIO settings for projects in this repository.
;
; Include from a project platformio.ini (adjust path for folder depth):
;
;   [platformio]
;   extra_configs = ../../platformio.shared.ini          ; Examples/MyProject/
;   extra_configs = ../../../platformio.shared.ini       ; Examples/ESP32/MyProject/
;
;   [env:my_board]
;   extends = common
;   platform = espressif32
;   board = esp32dev
;   framework = arduino
;
; Use lib_deps for standard Registry libraries when possible.
; Put custom or forked libraries in the repo-root libraries/ folder.

[common]
lib_extra_dirs =
    ${PROJECT_DIR}/../../libraries
    ${PROJECT_DIR}/../../../libraries

monitor_speed = 115200

; ESP32-C3 native USB serial (common for many ESP32 projects)
build_flags =
    -DCORE_DEBUG_LEVEL=0

; Avoid DTR/RTS reset when opening serial monitor on ESP32 USB boards
monitor_rts = 0
monitor_dtr = 0
