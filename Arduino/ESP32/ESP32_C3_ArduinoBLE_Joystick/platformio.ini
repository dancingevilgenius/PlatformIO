; ESP32-C3 - DIYables Bluetooth Joystick (Esp32BLE)
; Source: ArduinoSketches/ESP32/ESP32_C3_ArduinoBLE_Joystick

[env:esp32-c3-esp32ble-joystick]
platform = espressif32
board = esp32-c3-devkitm-1
framework = arduino
monitor_speed = 115200
upload_speed = 921600
monitor_filters = direct
monitor_eol = CRLF

; Huge APP (3MB No OTA/1MB SPIFFS) — required for BLE stack headroom
board_build.partitions = huge_app.csv

; DIYables_Bluetooth is vendored in lib/DIYables_Bluetooth

build_flags =
    -DCORE_DEBUG_LEVEL=0
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1

; ESP32-C3 native USB: avoid DTR/RTS glitches; press RESET if output is stale
monitor_rts = 0
monitor_dtr = 0
