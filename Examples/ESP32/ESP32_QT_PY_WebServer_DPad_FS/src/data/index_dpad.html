<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>D-Pad + 8×8 WebSocket Grid</title>

<style>
    body {
        background: #111;
        color: #eee;
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 0;
        text-align: center;
    }

    .center-column {
        margin-top: 20px;
    }

    select {
        font-size: 20px;
        padding: 8px;
        border-radius: 8px;
        margin-bottom: 10px;
    }

    .status-row {
        display: flex;
        justify-content: center;
        gap: 20px;
        margin-bottom: 20px;
    }

    .status-box {
        width: 140px;
        height: 40px;
        background: #222;
        border: 1px solid #555;
        border-radius: 6px;
        color: #fff;
        font-size: 18px;
        text-align: center;
        line-height: 40px;
    }

    .dpad-container {
        margin-top: 10px;
    }

    .row {
        display: flex;
        justify-content: center;
    }

    .btn {
        width: 80px;
        height: 80px;
        margin: 6px;
        border-radius: 12px;
        border: none;
        background: #333;
        color: #fff;
        font-size: 28px;
        cursor: pointer;
    }

    .btn:active {
        background: #555;
    }

    .bottom-buttons {
        margin-top: 40px;
        margin-bottom: 20px;
        display: flex;
        justify-content: center;
        gap: 20px;
    }

    .action-btn {
        width: 140px;
        height: 60px;
        border-radius: 10px;
        border: none;
        background: #444;
        color: #fff;
        font-size: 24px;
        cursor: pointer;
    }

    .action-btn:active {
        background: #666;
    }

    /* 8×8 grid */
    .grid-container {
        margin-top: 20px;
    }

    .grid-wrapper {
        display: flex;
        flex-direction: column;
        align-items: center;
        width: fit-content;
        margin: 0 auto;
    }

    .grid {
        display: grid;
        grid-template-columns: repeat(8, 36px);
        grid-template-rows: repeat(8, 36px);
        gap: 4px;
    }

    .grid-cell {
        width: 36px;
        height: 36px;
        border-radius: 4px;
        background: #000;
        transition: background 0.1s linear;
    }

    /* Stats */
    #stats {
        margin-bottom: 4px;
        font-size: 9px;          /* reduced even more */
        color: #0f0;
        width: 100%;
        box-sizing: border-box;
        text-align: center;
        font-family: monospace;
        letter-spacing: 1px;
        overflow-wrap: break-word;
    }

    /* Controls */
    .controls-wrapper {
        width: 100%;              /* EXACT width of grid */
        max-width: 100%;
        min-width: 100%;
        box-sizing: border-box;
        margin-top: 12px;
        display: flex;
        flex-direction: column;
        gap: 8px;
    }

    .control-row {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        background: #222;
        padding: 6px;
        border-radius: 10px;
        width: 100%;
        max-width: 100%;
        min-width: 100%;
        box-sizing: border-box;
    }

    .control-row label {
        width: 28%;
        max-width: 28%;
        min-width: 28%;
        font-size: 14px;
        text-align: left;
    }

    .control-row input[type="range"],
    .control-row select,
    .control-row button {
        width: 60%;
        max-width: 60%;
        min-width: 60%;
        font-size: 13px;
        padding: 6px;
        border-radius: 10px;
        border: 1px solid #555;
        background: #333;
        color: #fff;
    }

    .control-row button:hover {
        background: #444;
    }
</style>

<script>
// -----------------------------
// Padding helpers for fixed-width stats
// -----------------------------
function pad2(n) {
    return n.toString().padStart(2, ' ');
}

// Latency must always be 6 chars: "XXXX.X"
function padLatency(n) {
    let parts = n.toFixed(1).split('.');
    let whole = parts[0].padStart(4, ' ');
    return whole + '.' + parts[1];  // total length = 6
}

function pad3(n) {
    return n.toString().padStart(3, ' ');
}

// -----------------------------
// D-Pad HTTP control
// -----------------------------
function sendDirection(dir) {
    fetch('/controller', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ direction: dir })
    })
    .then(r => r.json())
    .then(data => {
        document.getElementById('hStatus').innerText = data.horiz || '';
        document.getElementById('vStatus').innerText = data.vert || '';
        if (data.message) alert(data.message);
    });
}

function sendAction(action) {
    fetch('/controller', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action: action })
    })
    .then(r => r.json())
    .then(data => {
        document.getElementById('hStatus').innerText = data.horiz || '';
        document.getElementById('vStatus').innerText = data.vert || '';
        if (data.message) alert(data.message);
    });
}

// -----------------------------
// WebSocket grid handling
// -----------------------------
let socket = null;
let reconnectTimer = null;
let lastPing = 0;
let frameCount = 0;
let lastFPSUpdate = performance.now();
let cells = [];

document.addEventListener('DOMContentLoaded', () => {
    const dropdown = document.getElementById('dropdown');
    const dpad = document.querySelector('.dpad-container');
    const grid8 = document.getElementById('grid8x8');
    const statusRow = document.querySelector('.status-row');
    const bottomButtons = document.querySelector('.bottom-buttons');

    dropdown.addEventListener('change', function() {
        if (this.value === '8x8') {
            dpad.style.display = 'none';
            grid8.style.display = 'block';

            statusRow.style.display = 'none';
            bottomButtons.style.display = 'none';
        } else {
            dpad.style.display = 'block';
            grid8.style.display = 'none';

            statusRow.style.display = 'flex';
            bottomButtons.style.display = 'flex';
        }
    });

    cells = Array.from(document.querySelectorAll('.grid-cell'));

    setupControls();
    connectWebSocket();
});

function connectWebSocket() {
    const host = window.location.hostname;
    socket = new WebSocket(`ws://${host}/ws`);
    socket.binaryType = "arraybuffer";

    socket.onopen = () => {
        socket.send("UA:" + navigator.userAgent);
        if (reconnectTimer) clearTimeout(reconnectTimer);
    };

    socket.onclose = () => {
        reconnectTimer = setTimeout(connectWebSocket, 500);
    };

    socket.onerror = () => socket.close();

    socket.onmessage = (event) => {
        if (typeof event.data === "string") {
            if (event.data === "PONG") {
                const latency = performance.now() - lastPing;
                document.getElementById("lat").textContent = padLatency(latency);
            }
            return;
        }

        const buf = event.data;
        document.getElementById("pkt").textContent = pad3(buf.byteLength);

        frameCount++;
        updateFPS();

        if (buf.byteLength === 128) {
            const view = new DataView(buf);
            for (let i = 0; i < 64; i++) {
                const val = view.getUint16(i * 2, true);
                updateCellColor(i, val);
            }
        } else if (buf.byteLength === 8) {
            const view = new DataView(buf);
            const bits = view.getBigUint64(0, true);
            for (let i = 0; i < 64; i++) {
                const on = ((bits >> BigInt(i)) & 1n) ? 1 : 0;
                updateCellColor(i, on ? 32 : 0);
            }
        }
    };
}

setInterval(() => {
    if (socket && socket.readyState === WebSocket.OPEN) {
        lastPing = performance.now();
        socket.send("PING");
    }
}, 2000);

function updateFPS() {
    const now = performance.now();
    const elapsed = now - lastFPSUpdate;

    if (elapsed >= 1000) {
        const fps = Math.round((frameCount / elapsed) * 1000);
        document.getElementById("fps").textContent = pad2(fps);
        frameCount = 0;
        lastFPSUpdate = now;
    }
}

function updateCellColor(index, value) {
    const briSlider = document.getElementById("briSlider");
    const brightness = briSlider ? (briSlider.value / 100) : 1.0;
    const scaled = Math.min(255, Math.floor((value / 32) * brightness * 255));

    cells[index].style.background =
        scaled === 0 ? "#222" : `rgb(${scaled}, 255, ${scaled})`;
}

function sendCommand(cmd) {
    if (socket && socket.readyState === WebSocket.OPEN) {
        socket.send(cmd);
    }
}

function setupControls() {
    const btnRun = document.getElementById("btnRun");
    const fpsSlider = document.getElementById("fpsSlider");
    const briSlider = document.getElementById("briSlider");
    const modeSelect = document.getElementById("modeSelect");

    let running = true;

    btnRun.onclick = () => {
        running = !running;
        btnRun.textContent = running ? "Pause" : "Resume";
        sendCommand("RUN:" + (running ? "1" : "0"));
    };

    fpsSlider.oninput = () => sendCommand("FPS:" + fpsSlider.value);
    briSlider.oninput = () =>
        sendCommand("BRI:" + (briSlider.value / 100).toFixed(2));
    modeSelect.onchange = () => sendCommand("MODE:" + modeSelect.value);
}
</script>
</head>

<body>

<div class="center-column">
    <select id="dropdown">
        <option value="dpad" selected>DPad</option>
        <option value="8x8">8x8</option>
        <option value="tba">TBA</option>
    </select>

    <div class="status-row">
        <div id="hStatus" class="status-box"></div>
        <div id="vStatus" class="status-box"></div>
    </div>
</div>

<div class="dpad-container">
    <div class="row">
        <button class="btn" onclick="sendDirection('up')">&#9650;</button>
    </div>
    <div class="row">
        <button class="btn" onclick="sendDirection('left')">&#9664;</button>
        <button class="btn" onclick="sendDirection('center')">OK</button>
        <button class="btn" onclick="sendDirection('right')">&#9654;</button>
    </div>
    <div class="row">
        <button class="btn" onclick="sendDirection('down')">&#9660;</button>
    </div>
</div>

<div id="grid8x8" class="grid-container" style="display:none;">
    <div class="grid-wrapper">

        <!-- Stats inside bounding box -->
        <div id="stats">
            FPS: <span id="fps"> 0</span> |
            Latency: <span id="lat">   0.0</span> ms |
            Packet: <span id="pkt">  0</span> bytes
        </div>

        <div class="row">
            <div class="grid">
                <!-- 64 cells -->
                <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
                <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
                <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
                <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
                <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
                <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
                <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
                <div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div><div class="grid-cell"></div>
            </div>
        </div>

        <div class="controls-wrapper">
            <div class="control-row">
                <label>FPS</label>
                <input id="fpsSlider" type="range" min="1" max="20" value="10">
            </div>

            <div class="control-row">
                <label>Brightness</label>
                <input id="briSlider" type="range" min="0" max="100" value="100">
            </div>

            <div class="control-row">
                <label>Animation</label>
                <button id="btnRun">Pause</button>
            </div>

            <div class="control-row">
                <label>Mode</label>
                <select id="modeSelect">
                    <option value="FULL">Full Grid</option>
                    <option value="BIT">Bitmask</option>
                </select>
            </div>
        </div>

    </div> <!-- end grid-wrapper -->
</div>

<div class="bottom-buttons">
    <button class="action-btn" onclick="sendAction('start')">Start</button>
    <button class="action-btn" onclick="sendAction('stop')">Stop</button>
</div>

</body>
</html>
