<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>8x8 Grid WebSocket Viewer</title>

<style>
    body {
        background: #111;
        color: #fff;
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 0;
        text-align: center;
    }

    .page-wrapper {
        width: 80vw;
        margin: 0 auto;
    }

    h2 {
        margin-top: 15px;
        font-size: 48px;
    }

    #stats {
        margin-top: 10px;
        font-size: 32px;
        color: #0f0;
    }

    /* GRID */
    .grid-container {
        width: 100%;
        margin-top: 20px;
    }

    .grid {
        display: grid;
        width: 100%;
        aspect-ratio: 1 / 1;
        grid-template-columns: repeat(8, 1fr);
        grid-template-rows: repeat(8, 1fr);
        gap: 4px;
    }

    .grid-cell {
        background: #333;
        border-radius: 4px;
        transition: background 0.1s linear;
    }

    /* CONTROLS */
    .controls-wrapper {
        width: 100%;
        margin-top: 30px;
        display: flex;
        flex-direction: column;
        gap: 20px;
        margin-bottom: 40px;
    }

    .control-row {
        display: flex;
        align-items: center;
        background: #222;
        padding: 16px;
        border-radius: 10px;
        width: 100%;
    }

    /* Label = 25% width */
    .control-row label {
        width: 25%;
        font-size: 32px;
        font-weight: bold;
        text-align: left;
        white-space: nowrap;
    }

    /* Control = 75% width */
    .control-row input[type="range"],
    .control-row select,
    .control-row button {
        width: 75%;
        font-size: 28px;
        padding: 12px;
        border-radius: 8px;
        border: 1px solid #555;
        background: #333;
        color: #fff;
    }

    .control-row button:hover {
        background: #444;
    }
</style>
</head>

<body>

<div class="page-wrapper">

    <h2>8×8 Grid WebSocket Display</h2>

    <div id="stats">
        FPS: <span id="fps">--</span> |
        Latency: <span id="lat">--</span> ms |
        Packet: <span id="pkt">--</span> bytes
    </div>

    <!-- GRID -->
    <div class="grid-container">
        <div id="grid" class="grid"></div>
    </div>

    <!-- CONTROLS -->
    <div class="controls-wrapper">

        <div class="control-row">
            <label>FPS</label>
            <input id="fpsSlider" type="range" min="1" max="60" value="10">
        </div>

        <div class="control-row">
            <label>Brightness</label>
            <input id="briSlider" type="range" min="0" max="100" value="100">
        </div>

        <div class="control-row">
            <label>Animation</label>
            <button id="btnRun">Pause</button>
        </div>

        <div class="control-row">
            <label>Pattern</label>
            <select id="patternSelect">
                <option value="0">Wave</option>
                <option value="1">Diagonal</option>
                <option value="2">Checker</option>
            </select>
        </div>

        <div class="control-row">
            <label>Mode</label>
            <select id="modeSelect">
                <option value="FULL">Full Grid</option>
                <option value="BIT">Bitmask</option>
            </select>
        </div>

    </div>

</div>

<script>
// Build 8×8 grid
const gridElement = document.getElementById("grid");
const cells = [];
for (let i = 0; i < 64; i++) {
    const div = document.createElement("div");
    div.className = "grid-cell";
    gridElement.appendChild(div);
    cells.push(div);
}

// ------------------------------------------------------------
// WebSocket with Auto-Reconnect
// ------------------------------------------------------------
let socket = null;
let reconnectTimer = null;

function connectWebSocket() {
    const host = window.location.hostname;
    socket = new WebSocket(`ws://${host}/ws`);
    socket.binaryType = "arraybuffer";

    socket.onopen = () => {
        console.log("WS connected");
        if (reconnectTimer) {
            clearTimeout(reconnectTimer);
            reconnectTimer = null;
        }
    };

    socket.onclose = () => {
        console.log("WS closed, reconnecting...");
        reconnectTimer = setTimeout(connectWebSocket, 500);
    };

    socket.onerror = () => {
        console.log("WS error");
        socket.close();
    };

    socket.onmessage = (event) => {
        if (typeof event.data === "string") {
            if (event.data === "PONG") {
                const latency = performance.now() - lastPing;
                document.getElementById("lat").textContent = latency.toFixed(1);
            }
            return;
        }

        const buf = event.data;
        document.getElementById("pkt").textContent = buf.byteLength;

        frameCount++;
        updateFPS();

        if (buf.byteLength === 128) {
            const view = new DataView(buf);
            for (let i = 0; i < 64; i++) {
                updateCellColor(i, view.getUint16(i * 2, true));
            }
        } else if (buf.byteLength === 8) {
            const view = new DataView(buf);
            const bits = view.getBigUint64(0, true);
            for (let i = 0; i < 64; i++) {
                updateCellColor(i, (bits >> BigInt(i)) & 1n ? 1 : 0);
            }
        }
    };
}

connectWebSocket();

// Ping every 2 seconds
let lastPing = 0;
setInterval(() => {
    if (socket.readyState === WebSocket.OPEN) {
        lastPing = performance.now();
        socket.send("PING");
    }
}, 2000);

// ------------------------------------------------------------
// FPS counter
// ------------------------------------------------------------
let frameCount = 0;
let lastFPSUpdate = performance.now();

function updateFPS() {
    const now = performance.now();
    const elapsed = now - lastFPSUpdate;

    if (elapsed >= 1000) {
        const fps = Math.round((frameCount / elapsed) * 1000);
        document.getElementById("fps").textContent = fps;
        frameCount = 0;
        lastFPSUpdate = now;
    }
}

function updateCellColor(index, value) {
    cells[index].style.background = value === 0 ? "#333" : "limegreen";
}

function sendCommand(cmd) {
    if (socket.readyState === WebSocket.OPEN) {
        socket.send(cmd);
    }
}

// ------------------------------------------------------------
// Controls
// ------------------------------------------------------------
const btnRun = document.getElementById("btnRun");
const fpsSlider = document.getElementById("fpsSlider");
const patternSelect = document.getElementById("patternSelect");
const briSlider = document.getElementById("briSlider");
const modeSelect = document.getElementById("modeSelect");

let running = true;

btnRun.onclick = () => {
    running = !running;
    btnRun.textContent = running ? "Pause" : "Resume";
    sendCommand("RUN:" + (running ? "1" : "0"));
};

fpsSlider.oninput = () => {
    sendCommand("FPS:" + fpsSlider.value);
};

patternSelect.onchange = () => {
    sendCommand("PAT:" + patternSelect.value);
};

briSlider.oninput = () => {
    sendCommand("BRI:" + (briSlider.value / 100).toFixed(2));
};

modeSelect.onchange = () => {
    sendCommand("MODE:" + modeSelect.value);
};
</script>

</body>
</html>
